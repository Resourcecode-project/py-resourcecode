name: Publish Resourcecode 📦 to PyPI and TestPypi (for providing test builds to alpha users)

on:
  pull_request:
  push:

jobs:
  build:
    name: Build distribution 📦
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Install uv
      uses: astral-sh/setup-uv@v8.1.0
      with:
        version: "0.11.16"
        enable-cache: true
    - name: Build a binary wheel and a source tarball
      run: uv build
    - name: Store the distribution packages
      uses: actions/upload-artifact@v4
      with:
        name: resourcecode
        path: dist/

  publish-to-pypi:
    name: >-
      Publish Resourcecode 📦 to PyPI
    if: startsWith(github.ref, 'refs/tags/')  # only publish to PyPI on tag pushes
    needs:
    - build
    runs-on: ubuntu-latest
    environment:
      name: publish
      url: https://pypi.org/p/resourcecode
    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing

    steps:
    - name: Download all the dists
      uses: actions/download-artifact@v4
      with:
        name: resourcecode
        path: dist/
    - name: Install uv
      uses: astral-sh/setup-uv@v8.1.0
      with:
        version: "0.11.16"
    - name: Publish Resourcecode 📦 to PyPI
      run: uv publish

  github-release:
    name: >-
      Sign the Resourcecode 📦 with Sigstore
      and upload them to GitHub Release
    needs:
    - publish-to-pypi
    runs-on: ubuntu-latest

    permissions:
      contents: write  # IMPORTANT: mandatory for making GitHub Releases
      id-token: write  # IMPORTANT: mandatory for sigstore

    steps:
    - uses: actions/checkout@v6
    - name: Download all the dists
      uses: actions/download-artifact@v4
      with:
        name: resourcecode
        path: dist/
    - name: Sign the dists with Sigstore
      uses: sigstore/gh-action-sigstore-python@v1.2.3
      with:
        inputs: >-
          ./dist/*.tar.gz
          ./dist/*.whl
    - name: Create GitHub Release
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: >-
        gh release create
        '${{ github.ref_name }}'
        --repo '${{ github.repository }}'
        --notes ""
    - name: Upload artifact signatures to GitHub Release
      env:
        GITHUB_TOKEN: ${{ github.token }}
      # Upload to GitHub Release using the `gh` CLI.
      # `dist/` contains the built packages, and the
      # sigstore-produced signatures and certificates.
      run: >-
        gh release upload
        '${{ github.ref_name }}' dist/**
        --repo '${{ github.repository }}'
  
  publish-to-testpypi:
    name: Publish Resourcecode 📦 to TestPyPI
    if: "!startsWith(github.ref, 'refs/tags/')"  # only publish to testPyPI for non-tagged pushes
    needs:
    - build
    runs-on: ubuntu-latest

    environment:
      name: publish
      url: https://test.pypi.org/p/resourcecode

    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing

    steps:
    - name: Download all the dists
      uses: actions/download-artifact@v4
      with:
        name: resourcecode
        path: dist/
    - name: Install uv
      uses: astral-sh/setup-uv@v8.1.0
      with:
        version: "0.11.16"
    - name: Publish Resourcecode 📦 to TestPyPI
      run: uv publish --token ${{ secrets.TEST_PYPI_TOKEN }} --publish-url https://test.pypi.org/legacy/
